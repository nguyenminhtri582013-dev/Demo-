<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tài Xỉu Du doan Predictor</title>

<style>

body{
margin:0;
background:radial-gradient(circle,#0b0b1a,#000);
font-family:Arial;
color:white;
text-align:center;
overflow:hidden;
}

/* tiêu đề cầu vồng */

h1{
font-size:38px;
background:linear-gradient(90deg,red,orange,yellow,green,cyan,blue,violet);
-webkit-background-clip:text;
color:transparent;
animation:rainbow 6s linear infinite;
text-shadow:0 0 20px rgba(255,255,255,0.4);
}

@keyframes rainbow{
0%{filter:hue-rotate(0deg);}
100%{filter:hue-rotate(360deg);}
}

/* box */

.box{
background:rgba(20,20,40,0.8);
margin:20px auto;
padding:20px;
width:340px;
border-radius:12px;
box-shadow:0 0 20px rgba(255,100,200,0.3);
backdrop-filter:blur(6px);
}

/* input */

input{
padding:10px;
border:none;
border-radius:6px;
width:200px;
}

/* button */

button{
padding:10px 18px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#ff5ea9,#ff9a44);
color:white;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

/* thanh xác suất */

.bar{
width:100%;
height:12px;
background:#333;
border-radius:10px;
margin-top:8px;
overflow:hidden;
}

.fill{
height:100%;
background:linear-gradient(90deg,cyan,magenta);
}

/* hoa đào */

.petal{
position:fixed;
top:-40px;
pointer-events:none;
background:radial-gradient(circle,#ffd1dc,#ff8fb1);
border-radius:60% 40% 60% 40%;
animation:fall linear forwards;
}

@keyframes fall{

0%{
transform:translateY(-40px) translateX(0) rotate(0deg);
opacity:0;
}

10%{opacity:1;}

100%{
transform:translateY(110vh) translateX(120px) rotate(360deg);
opacity:0.5;
}

}

/* sao lấp lánh */

.star{
position:fixed;
width:2px;
height:2px;
background:white;
animation:twinkle 3s infinite;
}

@keyframes twinkle{

0%{opacity:0}

50%{opacity:1}

100%{opacity:0}

}

/* ánh sáng bay */

.light{
position:fixed;
width:6px;
height:6px;
background:cyan;
border-radius:50%;
box-shadow:0 0 10px cyan;
animation:float 8s linear infinite;
}

@keyframes float{

0%{transform:translateY(100vh)}

100%{transform:translateY(-10vh)}

}

.admin{
margin-top:20px;
color:#aaa;
}

img{
max-width:200px;
border-radius:10px;
margin-top:10px;
}

</style>
</head>

<body>

<h1>Tài Xỉu Sakura Predictor</h1>

<div class="box">

<h3>Dự đoán bằng chuỗi cầu</h3>

<input id="pattern" placeholder="vd: txtxtx">

<br><br>

<button onclick="predictPattern()">Phân tích</button>

<div id="patternResult"></div>

</div>

<div class="box">

<h3>Dự đoán bằng MD5</h3>

<input id="md5" placeholder="Nhập MD5">

<br><br>

<button onclick="predictMD5()">Phân tích</button>

<div id="md5Result"></div>

</div>

<div class="box">

<h3>Dự đoán bằng hình ảnh</h3>

<input type="file" id="imgInput" onchange="previewImage()">

<br><br>

<img id="preview">

<br><br>

<button onclick="predictImage()">Phân tích</button>

<div id="imgResult"></div>

</div>

<div class="admin">

Admin: quocviet  
<br>
<span id="time"></span>

</div>

<script>

/* dự đoán chuỗi */

function predictPattern(){

let data=document.getElementById("pattern").value.toLowerCase()

let t=(data.match(/t/g)||[]).length
let x=(data.match(/x/g)||[]).length

let total=t+x

if(total==0)return

let pt=(t/total*100).toFixed(1)
let px=(x/total*100).toFixed(1)

let result=pt>px?"Tài":"Xỉu"

document.getElementById("patternResult").innerHTML=
"Dự đoán: "+result+"<br>Tài "+pt+"% | Xỉu "+px+"%"+
'<div class="bar"><div class="fill" style="width:'+pt+'%"></div></div>'

}

/* md5 */

function predictMD5(){

let md5=document.getElementById("md5").value

let num=parseInt(md5.substring(0,8),16)

let result=num%2==0?"Tài":"Xỉu"

let percent=(50+Math.random()*30).toFixed(1)

document.getElementById("md5Result").innerHTML=
"Dự đoán: "+result+" ("+percent+"%)"

}

/* preview ảnh */

function previewImage(){

let file=document.getElementById("imgInput").files[0]

let reader=new FileReader()

reader.onload=e=>{
document.getElementById("preview").src=e.target.result
}

if(file)reader.readAsDataURL(file)

}

/* demo ảnh */

function predictImage(){

let result=Math.random()>0.5?"Tài":"Xỉu"

let percent=(50+Math.random()*25).toFixed(1)

document.getElementById("imgResult").innerHTML=
"Dự đoán: "+result+" ("+percent+"%)"

}

/* thời gian */

setInterval(()=>{

document.getElementById("time").innerHTML=new Date().toLocaleString()

},1000)

/* hoa đào */

function createPetal(){

let p=document.createElement("div")

p.className="petal"

let size=8+Math.random()*14

p.style.width=size+"px"
p.style.height=size+"px"

p.style.left=Math.random()*100+"vw"

p.style.animationDuration=(6+Math.random()*8)+"s"

document.body.appendChild(p)

setTimeout(()=>p.remove(),12000)

}

setInterval(createPetal,120)

/* sao */

for(let i=0;i<80;i++){

let s=document.createElement("div")

s.className="star"

s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"

s.style.animationDelay=Math.random()*3+"s"

document.body.appendChild(s)

}

/* ánh sáng bay */

function createLight(){

let l=document.createElement("div")

l.className="light"

l.style.left=Math.random()*100+"vw"

document.body.appendChild(l)

setTimeout(()=>l.remove(),8000)

}

setInterval(createLight,700)

</script>

</body>
</html>
